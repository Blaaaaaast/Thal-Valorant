<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>트할의 발로란트</title>
    <style>
        body { background: #0f1923; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .main-layout { display: flex; gap: 25px; max-width: 1300px; width: 100%; }
        
        .container { flex: 1.5; background: #1f2933; padding: 30px; border-radius: 15px; border-top: 5px solid #ff4655; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .sidebar { flex: 1; display: flex; flex-direction: column; gap: 20px; min-width: 420px; }
        .side-box { background: #16202a; padding: 22px; border-radius: 15px; border: 1px solid #2a3a4a; }
        
        .copyright-notice { 
            background: #ff4655; color: white; padding: 12px; border-radius: 8px; 
            font-size: 11px; font-weight: bold; line-height: 1.5; text-align: center; 
            margin-bottom: 5px; border: 1px solid rgba(255,255,255,0.2); 
        }

        h1 { color: #ff4655; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 25px; font-size: 24px; text-align: center; }
        h2 { font-size: 14px; color: #ece8e1; margin-top: 0; text-align: left; border-left: 5px solid #ff4655; padding-left: 12px; margin-bottom: 15px; text-transform: uppercase; }

        .tier-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 8px; }
        .tier-label { width: 65px; font-weight: bold; color: #ff4655; font-size: 14px; }
        .tier-input, .side-input { flex: 1; padding: 12px; border: none; border-radius: 5px; background: #ece8e1; color: #0f1923; font-weight: bold; font-size: 14px; }
        .lock-btn { width: 55px; padding: 10px; border: 1px solid #444; border-radius: 5px; cursor: pointer; background: #2a3a4a; color: #888; font-size: 11px; }
        .lock-btn.locked { background: #ff4655; color: white; }

        .map-selector { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 15px; }
        .map-item { padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; background: #2a3a4a; color: #7e8c9a; }
        .map-item.active { background: #ece8e1; color: #0f1923; }

        .map-result-box { 
            background: #0f1923; padding: 25px; border-radius: 12px; border: 3px solid #ff4655; 
            text-align: center; margin-top: 15px; display: none; 
            box-shadow: 0 0 20px rgba(255, 70, 85, 0.4);
        }
        #selectedMap { color: #ff4655; font-size: 32px; font-weight: 900; display: block; margin-top: 10px; }

        .live-result-container { display: flex; flex-direction: row; gap: 15px; margin-bottom: 15px; width: 100%; }
        .live-card { flex: 1; background: #16202a; padding: 15px; border-radius: 10px; border: 1px solid #2a3a4a; min-height: 180px; }
        .live-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 10px; }
        .live-badge { padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 900; }
        .player-line { font-size: 14px; padding: 5px 0; border-bottom: 1px solid #1f2933; color: #ece8e1; }

        .main-btn { border: none; padding: 15px; font-size: 15px; font-weight: bold; cursor: pointer; border-radius: 5px; width: 100%; margin-top: 10px; transition: 0.2s; }
        .pick-team-btn { background: #ff4655; color: white; margin-bottom: 10px; }
        .pick-map-btn { background: #00ea96; color: #0f1923; font-size: 18px; }
        .summary-btn { background: #ece8e1; color: #0f1923; margin-top: 10px; font-size: 16px; text-transform: uppercase; border: 2px solid #0f1923; }
        
        .side-btn { background: #00ea96; color: #0f1923; width: 100%; border: none; padding: 12px; font-weight: 900; border-radius: 6px; cursor: pointer; margin-bottom: 10px; font-size: 14px; }
        
        .draw-box { padding: 12px; background: #0f1923; border-radius: 8px; border: 2px solid #ff4655; text-align: center; margin-bottom: 10px; font-size: 14px; }
        .reroll-box { border: 2px solid #00ea96; background: #0a1219; position: relative; display: none; }
        .reroll-label { position: absolute; top: -10px; right: 10px; background: #00ea96; color: #0f1923; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }

        #sideOnlyResult { border: 2px solid #00ea96; }

        /* 드래프트 라벨 스타일 */
        .draft-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .draft-label { width: 50px; font-size: 12px; font-weight: bold; color: #888; text-align: left; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1f2933; width: 90%; max-width: 600px; padding: 30px; border-radius: 20px; border: 3px solid #ff4655; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .modal-header { font-size: 28px; font-weight: 900; color: #ff4655; text-align: center; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; letter-spacing: 2px; }
        .modal-player-list { list-style: none; padding: 0; margin: 0; }
        .modal-player-list li { font-size: 18px; font-weight: bold; color: #ece8e1; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .modal-badge { padding: 6px 15px; border-radius: 5px; font-size: 16px; font-weight: 900; text-transform: uppercase; }
        .close-modal-btn { position: absolute; top: 15px; right: 20px; background: none; border: none; color: white; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="container">
        <h1>트할의 발로란트</h1>
        
        <div class="section">
            <h2>1. 플레이어 명단 (잠금/해제 클릭 시 묶밸)</h2>
            <div id="tierInputs">
                <script>
                    for(let i=1; i<=5; i++) {
                        document.write(`
                            <div class="tier-row" id="row-${i}">
                                <span class="tier-label">티어 ${i}</span>
                                <input type="text" class="tier-input" id="p${i}_1" placeholder="팀원 1">
                                <input type="text" class="tier-input" id="p${i}_2" placeholder="팀원 2">
                                <button class="lock-btn" onclick="this.classList.toggle('locked'); this.innerText = this.classList.contains('locked') ? '잠금' : '해제';">해제</button>
                            </div>
                        `);
                    }
                </script>
            </div>
        </div>

        <div class="section" style="margin-top: 30px;">
            <h2>2. 맵 풀 설정 (맵 클릭 시 추첨 제외)</h2>
            <div id="mapSelector" class="map-selector"></div>
            <button class="main-btn pick-map-btn" onclick="pickMap()">🗺️ 맵 랜덤 추첨하기</button>
            <div id="mapResultArea" class="map-result-box">
                <span style="color: #ece8e1; font-size: 14px; letter-spacing: 2px; font-weight: bold;">SELECTED MAP</span>
                <span id="selectedMap">-</span>
            </div>
        </div>

        <div class="section" style="margin-top: 30px;">
            <h2>3. 팀원 & 공/수 추첨</h2>
            <div class="live-result-container">
                <div class="live-card" style="border-top: 4px solid #ff4655;">
                    <div class="live-header">
                        <span style="font-weight:900; color:#ff4655;">TEAM A</span>
                        <span id="liveBadgeA" class="live-badge" style="display:none;">-</span>
                    </div>
                    <div id="liveListA"></div>
                </div>
                <div class="live-card" style="border-top: 4px solid #00ea96;">
                    <div class="live-header">
                        <span style="font-weight:900; color:#00ea96;">TEAM B</span>
                        <span id="liveBadgeB" class="live-badge" style="display:none;">-</span>
                    </div>
                    <div id="liveListB"></div>
                </div>
            </div>
            <button class="main-btn pick-team-btn" onclick="generateTeams()">팀원 및 공/수 랜덤 추첨하기</button>
            <button class="main-btn summary-btn" onclick="openFinalSummary()">💥 최종 추첨 결과 한눈에 보기 (팝업)</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="copyright-notice">저작권: 트할 (무단 수정 및 배포 금지)</div>
        
        <div class="side-box">
            <h2>STEP 1. 뽑기 티어 & 선픽/후픽 추첨</h2>
            <button class="side-btn" onclick="drawTierAndOrder()">🎲 랜덤 티어 & 선픽/후픽 뽑기</button>
            <button class="side-btn" style="background:#ff4655; color:white; display:none;" id="rerollBtn" onclick="reRollOrder()">🔄 선픽/후픽 리롤하기</button>
            
            <div id="sideDrawResult" class="draw-box">추첨 대기 중...</div>
            <div id="rerollResultArea" class="draw-box reroll-box">
                <div class="reroll-label">RE-ROLL</div>
                <div id="rerollContent" style="color:#00ea96; font-weight:bold;"></div>
            </div>
        </div>

        <div class="side-box">
            <h2>STEP 2. 드래프트</h2>
            <div id="draftRecordArea">
                <script>
                    const labels = ["팀장", "팀원 2", "팀원 3", "팀원 4", "팀원 5"];
                    for(let i=1; i<=5; i++) {
                        document.write(`
                            <div class="draft-row">
                                <span class="draft-label">${labels[i-1]}</span>
                                <input type="text" id="rec_${i}_A" class="side-input" style="padding:8px; font-size:12px;" placeholder="팀 A">
                                <input type="text" id="rec_${i}_B" class="side-input" style="padding:8px; font-size:12px;" placeholder="팀 B">
                            </div>
                        `);
                    }
                </script>
            </div>
        </div>

        <div class="side-box">
            <h2>STEP 3. 공/수 추첨</h2>
            <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                <input type="text" id="leader1" class="side-input" placeholder="팀장 1">
                <input type="text" id="leader2" class="side-input" placeholder="팀장 2">
            </div>
            <button class="side-btn" style="background: #ff4655; color: white;" onclick="pickSideOnly()">🎲 공/수 추첨하기</button>
            <div id="sideOnlyResult" class="draw-box" style="display:none;"></div>

            <div style="margin-top:15px; padding-top:15px; border-top:1px solid #333;">
                <h2 style="border:none; padding:0; font-size:12px; margin-bottom:10px; color:#888;">최종 통합 결과 확인</h2>
                <button class="side-btn" style="background: #ece8e1; color:#0f1923;" onclick="manualSummary()">💥최종 추첨 결과 한눈에 보기 (팝업)</button>
            </div>
        </div>
    </div>
</div>

<div id="finalModal" class="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="close-modal-btn" onclick="closeModal()">&times;</button>
        <div class="modal-header">MATCH</div>
        <div style="background:#0f1923; padding:20px; border-radius:12px; text-align:center; margin-bottom:25px; border: 1px solid #333;">
            <span style="font-size:14px; color:#888; display:block; margin-bottom:5px;">MAP</span>
            <span id="modalMap" style="font-size:24px; font-weight:bold; color:#ece8e1;">?</span>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
            <div style="background:#16202a; padding:20px; border-radius:15px; border:1px solid #2a3a4a;">
                <div style="display:flex; flex-direction:column; align-items:center; gap:10px; margin-bottom:15px;">
                    <b id="modalTeamA" style="font-size:18px; color:#ff4655;">TEAM A</b>
                    <span id="modalBadgeA" class="modal-badge">-</span>
                </div>
                <ul id="modalListA" class="modal-player-list"></ul>
            </div>
            <div style="background:#16202a; padding:20px; border-radius:15px; border:1px solid #2a3a4a;">
                <div style="display:flex; flex-direction:column; align-items:center; gap:10px; margin-bottom:15px;">
                    <b id="modalTeamB" style="font-size:18px; color:#00ea96;">TEAM B</b>
                    <span id="modalBadgeB" class="modal-badge">-</span>
                </div>
                <ul id="modalListB" class="modal-player-list"></ul>
            </div>
        </div>
    </div>
</div>

<script>
    const allMaps = ["어비스", "로터스", "바인드", "아이스박스", "선셋", "헤이븐", "어센트", "프랙처", "펄", "브리즈", "스플릿", "코로드"];
    let activeMaps = [...allMaps];
    let currentTierData = null;
    let lastGeneratedData = null;
    let sideDrawResult = null;

    function initMaps() {
        const sel = document.getElementById('mapSelector');
        sel.innerHTML = allMaps.map(m => `<div class="map-item active" onclick="toggleMap(this, '${m}')">${m}</div>`).join('');
    }
    function toggleMap(el, name) {
        el.classList.toggle('active');
        if(el.classList.contains('active')) activeMaps.push(name);
        else activeMaps = activeMaps.filter(m => m !== name);
    }
    function pickMap() {
        if(!activeMaps.length) return alert("맵을 선택해주세요.");
        const map = activeMaps[Math.floor(Math.random()*activeMaps.length)];
        document.getElementById('mapResultArea').style.display = "block";
        document.getElementById('selectedMap').innerText = map;
    }
    function applySideStyle(element, isAtk) {
        element.innerText = isAtk ? "공격" : "수비";
        element.style.background = isAtk ? "#ff4655" : "#00ea96";
        element.style.color = isAtk ? "white" : "#0f1923";
    }
    function generateTeams() {
        let a = []; let b = [];
        for(let i=1; i<=5; i++) {
            const p1 = document.getElementById(`p${i}_1`).value.trim();
            const p2 = document.getElementById(`p${i}_2`).value.trim();
            const lock = document.querySelector(`#row-${i} .lock-btn`).classList.contains('locked');
            if(!p1 || !p2) return alert(i+"티어 멤버를 입력하세요.");
            if(lock || Math.random() > 0.5) { a.push(p1); b.push(p2); }
            else { a.push(p2); b.push(p1); }
        }
        const isAAtk = Math.random() > 0.5;
        lastGeneratedData = { a, b, isAAtk };
        const bA = document.getElementById('liveBadgeA');
        const bB = document.getElementById('liveBadgeB');
        bA.style.display = "inline-block";
        bB.style.display = "inline-block";
        applySideStyle(bA, isAAtk);
        applySideStyle(bB, !isAAtk);
        document.getElementById('liveListA').innerHTML = a.map(n => `<div class="player-line">• ${n}</div>`).join('');
        document.getElementById('liveListB').innerHTML = b.map(n => `<div class="player-line">• ${n}</div>`).join('');
    }
    function openFinalSummary() {
        const map = document.getElementById('selectedMap').innerText;
        if(!lastGeneratedData || map === "-") return alert("팀원 추첨과 맵 추첨을 먼저 완료해주세요!");
        document.getElementById('modalMap').innerText = map;
        document.getElementById('modalTeamA').innerText = "TEAM A";
        document.getElementById('modalTeamB').innerText = "TEAM B";
        const bA = document.getElementById('modalBadgeA');
        const bB = document.getElementById('modalBadgeB');
        applySideStyle(bA, lastGeneratedData.isAAtk);
        applySideStyle(bB, !lastGeneratedData.isAAtk);
        document.getElementById('modalListA').innerHTML = lastGeneratedData.a.map(n => `<li>• ${n}</li>`).join('');
        document.getElementById('modalListB').innerHTML = lastGeneratedData.b.map(n => `<li>• ${n}</li>`).join('');
        document.getElementById('finalModal').style.display = "flex";
    }
    function drawTierAndOrder() {
        const tiers = [];
        for(let i=1; i<=5; i++){
            const p1 = document.getElementById(`p${i}_1`).value;
            const p2 = document.getElementById(`p${i}_2`).value;
            if(p1 && p2) tiers.push({i, p1, p2});
        }
        if(!tiers.length) return alert("명단을 입력하세요.");
        currentTierData = tiers[Math.floor(Math.random()*tiers.length)];
        document.getElementById('rerollBtn').style.display = "block";
        document.getElementById('rerollResultArea').style.display = "none";
        const s = [currentTierData.p1, currentTierData.p2].sort(() => Math.random()-0.5);
        document.getElementById('sideDrawResult').innerHTML = `티어 ${currentTierData.i} 당첨!<br>선픽: <b>${s[0]}</b> / 후픽: <b>${s[1]}</b>`;
        document.getElementById('rec_1_A').value = s[0];
        document.getElementById('rec_1_B').value = s[1];
        document.getElementById('leader1').value = s[0];
        document.getElementById('leader2').value = s[1];
    }
    function reRollOrder() {
        if(!currentTierData) return;
        const s = [currentTierData.p1, currentTierData.p2].sort(() => Math.random()-0.5);
        const area = document.getElementById('rerollResultArea');
        area.style.display = "block";
        document.getElementById('rerollContent').innerHTML = `리롤 결과! <br>선픽: ${s[0]} / 후픽: ${s[1]}`;
    }
    function pickSideOnly() {
        const l1 = document.getElementById('leader1').value;
        const l2 = document.getElementById('leader2').value;
        if(!l1 || !l2) return alert("팀장 명단이 비어있습니다.");
        const isAtk = Math.random() > 0.5;
        sideDrawResult = isAtk;
        const resBox = document.getElementById('sideOnlyResult');
        resBox.style.display = "block";
        const text1 = isAtk ? `<span style="color:#ff4655; font-weight:900;">공격</span>` : `<span style="color:#00ea96; font-weight:900;">수비</span>`;
        const text2 = !isAtk ? `<span style="color:#ff4655; font-weight:900;">공격</span>` : `<span style="color:#00ea96; font-weight:900;">수비</span>`;
        resBox.innerHTML = `<b>${l1}</b>: ${text1} / <b>${l2}</b>: ${text2}`;
    }
    function manualSummary() {
        const l1 = document.getElementById('leader1').value;
        const l2 = document.getElementById('leader2').value;
        const map = document.getElementById('selectedMap').innerText;
        if(!l1 || !l2 || map === "-") return alert("팀장 이름과 맵을 확인해주세요.");
        if(sideDrawResult === null) return alert("공/수 랜덤 뽑기를 먼저 진행해주세요.");
        document.getElementById('modalMap').innerText = map;
        document.getElementById('modalTeamA').innerText = "TEAM " + l1;
        document.getElementById('modalTeamB').innerText = "TEAM " + l2;
        const bA = document.getElementById('modalBadgeA');
        const bB = document.getElementById('modalBadgeB');
        applySideStyle(bA, sideDrawResult);
        applySideStyle(bB, !sideDrawResult);
        let la = ""; let lb = "";
        for(let i=1; i<=5; i++) {
            la += `<li>• ${document.getElementById('rec_'+i+'_A').value || '?'}</li>`;
            lb += `<li>• ${document.getElementById('rec_'+i+'_B').value || '?'}</li>`;
        }
        document.getElementById('modalListA').innerHTML = la;
        document.getElementById('modalListB').innerHTML = lb;
        document.getElementById('finalModal').style.display = "flex";
    }
    function closeModal() { document.getElementById('finalModal').style.display = "none"; }
    initMaps();
</script>
</body>
</html>
