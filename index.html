<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>트할의 발로란트</title>
    <style>
        /* [수정] 전체 스크롤을 오른쪽 끝(기본 위치)으로 복구 */
        html, body { 
            background: #0f1923; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 0; 
            min-height: 100vh;
            overflow-x: hidden; /* 가로 스크롤 방지 */
            overflow-y: auto;   /* 브라우저 기본 스크롤 사용 */
        }

        /* [수정] 메인 레이아웃: 스크롤 영역을 해제하여 부모(body) 스크롤을 따름 */
        .main-layout { 
            display: flex; 
            gap: 20px; 
            max-width: 1440px; 
            width: 100%; 
            margin: 0 auto;
            padding: 15px 15px 15px 55px; /* 왼쪽 버튼 공간 확보 */
            box-sizing: border-box;
            position: relative;
        }
        
        /* --- 포지션 믹서 스타일 (오버레이 방식 유지) --- */
        .pos-toggle-btn {
            position: fixed; 
            left: 10px; 
            top: 10px; 
            background: #ff4655; /* 기본 OFF 상태: 빨간색 */
            color: white; 
            border: none; 
            padding: 10px 15px;
            cursor: pointer; 
            border-radius: 4px; 
            font-weight: bold; 
            z-index: 1100;
            font-size: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-transform: uppercase;
            transition: background 0.3s ease;
        }

        /* [추가] ON 상태일 때 초록색 스타일 */
        .pos-toggle-btn.on {
            background: #00ea96;
            color: #0f1923;
        }

        /* [수정] 패널 테두리 제거 및 스크롤바 숨김 처리 */
        .pos-floating-panel {
            position: fixed;
            left: -280px; /* 기본 숨김 */
            top: 60px;
            width: 240px;
            background: rgba(31, 41, 51, 0.98);
            padding: 20px;
            border-radius: 0 15px 15px 0;
            border-left: none;
            transition: left 0.3s ease;
            z-index: 1050;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .pos-floating-panel::-webkit-scrollbar {
            display: none;
        }

        .pos-floating-panel.active {
            left: 0; 
        }

        .tier-pos-card { background: #16202a; padding: 12px; border-radius: 10px; border: 1px solid #2a3a4a; margin-bottom: 10px; border-left: 3px solid #00ea96; }
        .tier-pos-header { font-size: 11px; font-weight: 900; color: #00ea96; margin-bottom: 8px; }
        .tier-pos-pool { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
        .pos-btn { padding: 4px 6px; border-radius: 3px; cursor: pointer; font-size: 9px; font-weight: bold; background: #2a3a4a; color: #7e8c9a; border: none; }
        .pos-btn.active { background: #00ea96; color: #0f1923; }
        .tier-pos-res-box { background: #0f1923; padding: 8px; border-radius: 4px; border: 1px solid #333; text-align: center; margin-bottom: 5px; }
        .res-text { font-size: 12px; font-weight: bold; color: #ece8e1; }
        .mix-btn { background: #ece8e1; color: #0f1923; border: none; width: 100%; padding: 6px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 11px; }

        /* [수정] 중앙 컨테이너 크기 축소 */
        .container { flex: 1.2; background: #1f2933; padding: 20px; border-radius: 15px; border-top: 5px solid #ff4655; box-shadow: 0 10px 30px rgba(0,0,0,0.5); height: fit-content; }
        
        /* [수정] 사이드바 크기 확대 */
        .sidebar { flex: 1.1; display: flex; flex-direction: column; gap: 15px; min-width: 450px; height: fit-content; }
        .side-box { background: #16202a; padding: 25px; border-radius: 15px; border: 1px solid #2a3a4a; }
        
        /* [수정] 저작권 박스 위치를 오른쪽 상단 고정으로 변경 */
        .copyright-notice { 
            position: fixed;
            top: 10px;
            right: 15px;
            background: #ff4655; 
            color: white; 
            padding: 8px 15px; 
            border-radius: 8px; 
            font-size: 11px; 
            font-weight: bold; 
            line-height: 1.5; 
            text-align: center; 
            z-index: 1200;
            border: 1px solid rgba(255,255,255,0.2); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* [추가] 티어표 바로가기 버튼 스타일 */
        .tier-link-btn {
            position: fixed;
            top: 50px; /* 저작권 박스 아래 위치 */
            right: 15px;
            background: #00ea96; 
            color: #0f1923; 
            padding: 8px 15px; 
            border-radius: 8px; 
            font-size: 11px; 
            font-weight: bold; 
            text-decoration: none;
            z-index: 1200;
            border: 1px solid rgba(0,0,0,0.1); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s ease;
            text-align: center;
        }
        .tier-link-btn:hover {
            transform: scale(1.05);
            background: #00cc82;
        }

        h1 { color: #ff4655; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 15px; font-size: 22px; text-align: center; }
        h2 { font-size: 13px; color: #ece8e1; margin-top: 0; text-align: left; border-left: 5px solid #ff4655; padding-left: 10px; margin-bottom: 12px; text-transform: uppercase; }
        
        /* [수정] 입력창 높이 축소 */
        .tier-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; gap: 6px; }
        .tier-label { width: 55px; font-weight: bold; color: #ff4655; font-size: 13px; }
        .tier-input, .side-input { flex: 1; padding: 8px 12px; border: none; border-radius: 5px; background: #ece8e1; color: #0f1923; font-weight: bold; font-size: 13px; }
        .lock-btn { width: 50px; padding: 8px; border: 1px solid #444; border-radius: 5px; cursor: pointer; background: #2a3a4a; color: #888; font-size: 10px; }
        .lock-btn.locked { background: #ff4655; color: white; }
        
        .map-selector { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-bottom: 10px; }
        .map-item { padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; background: #2a3a4a; color: #7e8c9a; }
        .map-item.active { background: #ece8e1; color: #0f1923; }
        .map-result-box { background: #0f1923; padding: 15px; border-radius: 12px; border: 3px solid #ff4655; text-align: center; margin-top: 10px; display: none; box-shadow: 0 0 20px rgba(255, 70, 85, 0.4); }
        #selectedMap { color: #ff4655; font-size: 24px; font-weight: 900; display: block; margin-top: 5px; }
        
        .live-result-container { display: flex; flex-direction: row; gap: 10px; margin-bottom: 10px; width: 100%; }
        .live-card { flex: 1; background: #16202a; padding: 12px; border-radius: 10px; border: 1px solid #2a3a4a; min-height: 150px; }
        .live-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 6px; margin-bottom: 8px; }
        .live-badge { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 900; }
        .player-line { font-size: 13px; padding: 4px 0; border-bottom: 1px solid #1f2933; color: #ece8e1; }
        
        .main-btn { border: none; padding: 12px; font-size: 14px; font-weight: bold; cursor: pointer; border-radius: 5px; width: 100%; margin-top: 8px; transition: 0.2s; }
        .pick-team-btn { background: #ff4655; color: white; margin-bottom: 8px; }
        .pick-map-btn { background: #00ea96; color: #0f1923; font-size: 16px; }
        .summary-btn { background: #ece8e1; color: #0f1923; margin-top: 8px; font-size: 14px; text-transform: uppercase; border: 2px solid #0f1923; }
        
        .side-btn { background: #00ea96; color: #0f1923; width: 100%; border: none; padding: 14px; font-weight: 900; border-radius: 6px; cursor: pointer; margin-bottom: 12px; font-size: 15px; }
        .draw-box { padding: 15px; background: #0f1923; border-radius: 8px; border: 2px solid #ff4655; text-align: center; margin-bottom: 12px; font-size: 15px; }
        .reroll-box { border: 2px solid #00ea96; background: #0a1219; position: relative; display: none; }
        .reroll-label { position: absolute; top: -10px; right: 10px; background: #00ea96; color: #0f1923; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        #sideOnlyResult { border: 2px solid #00ea96; }
        .draft-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .draft-label { width: 55px; font-size: 13px; font-weight: bold; color: #888; text-align: left; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: #1f2933; width: 90%; max-width: 600px; padding: 30px; border-radius: 20px; border: 3px solid #ff4655; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        .modal-header { font-size: 28px; font-weight: 900; color: #ff4655; text-align: center; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; letter-spacing: 2px; }
        .modal-player-list { list-style: none; padding: 0; margin: 0; }
        .modal-player-list li { font-size: 18px; font-weight: bold; color: #ece8e1; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .modal-badge { padding: 6px 15px; border-radius: 5px; font-size: 16px; font-weight: 900; text-transform: uppercase; }
        .close-modal-btn { position: absolute; top: 15px; right: 20px; background: none; border: none; color: white; font-size: 30px; cursor: pointer; }

        .modal-pos-container { display: flex; justify-content: center; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .modal-pos-item { background: #2a3a4a; padding: 5px 10px; border-radius: 5px; font-size: 12px; border-bottom: 2px solid #00ea96; display: flex; flex-direction: column; align-items: center; min-width: 60px; }
        .modal-pos-label { color: #888; font-size: 10px; margin-bottom: 2px; }
        .modal-pos-value { color: #00ea96; font-weight: bold; }
    </style>
</head>
<body>

<div class="copyright-notice">저작권: 트할 (무단 수정 및 배포 금지)</div>
<a href="https://docs.google.com/spreadsheets/d/1s2NYCIFKlXNER9mnsdYUqKbnUIGdkVrnxm0YqSZVbXE/edit?pli=1&gid=1937847315#gid=1937847315" target="_blank" class="tier-link-btn">발로란트 티어표 보러가기</a>

<button class="pos-toggle-btn" id="posToggleBtn" onclick="togglePosMixer()">랜덤 포지션 On/Off</button>

<div class="pos-floating-panel" id="posMixer">
    <h2 style="border:none; padding:0; text-align:center; font-size:16px; margin-bottom:15px; color:#00ea96;">Position Mixer</h2>
    <script>
        const posNames = ["엔트리", "연막", "감시자", "척후대", "플렉스"];
        for(let i=1; i<=5; i++) {
            document.write(`
                <div class="tier-pos-card">
                    <div class="tier-pos-header">티어 ${i} 포지션</div>
                    <div class="tier-pos-pool" id="pool_${i}">
                        ${posNames.map(p => `<button class="pos-btn active" onclick="this.classList.toggle('active')">${p}</button>`).join('')}
                    </div>
                    <div class="tier-pos-res-box"><span class="res-text" id="res_${i}">대기 중</span></div>
                    <button class="mix-btn" onclick="mixPosition(${i})">랜덤 추첨</button>
                </div>
            `);
        }
    </script>
</div>

<div class="main-layout">
    <div class="container">
        <h1>트할의 발로란트</h1>
        
        <div class="section">
            <h2>1. 플레이어 명단 (잠금/해제 클릭 시 묶밸)</h2>
            <div id="tierInputs">
                <script>
                    for(let i=1; i<=5; i++) {
                        document.write(`
                            <div class="tier-row" id="row-${i}">
                                <span class="tier-label">티어 ${i}</span>
                                <input type="text" class="tier-input" id="p${i}_1" placeholder="스트리머 이름">
                                <input type="text" class="tier-input" id="p${i}_2" placeholder="스트리머 이름">
                                <button class="lock-btn" onclick="this.classList.toggle('locked'); this.innerText = this.classList.contains('locked') ? '잠금' : '해제';">해제</button>
                            </div>
                        `);
                    }
                </script>
            </div>
        </div>

        <div class="section" style="margin-top: 15px;">
            <h2>2. 맵 풀 설정 (맵 클릭 시 추첨 제외)</h2>
            <div id="mapSelector" class="map-selector"></div>
            <button class="main-btn pick-map-btn" onclick="pickMap()">🗺️ 맵 랜덤 추첨하기</button>
            <div id="mapResultArea" class="map-result-box">
                <span style="color: #ece8e1; font-size: 12px; letter-spacing: 2px; font-weight: bold;">SELECTED MAP</span>
                <span id="selectedMap">-</span>
                <div id="modalPositions" class="modal-pos-container" style="display:none;"></div>
            </div>
        </div>

        <div class="section" style="margin-top: 15px;">
            <h2>3. 팀원 & 공/수</h2>
            <div class="live-result-container">
                <div class="live-card" style="border-top: 4px solid #ff4655;">
                    <div class="live-header">
                        <span style="font-weight:900; color:#ff4655; font-size: 13px;">TEAM A</span>
                        <span id="liveBadgeA" class="live-badge" style="display:none;">-</span>
                    </div>
                    <div id="liveListA"></div>
                </div>
                <div class="live-card" style="border-top: 4px solid #00ea96;">
                    <div class="live-header">
                        <span style="font-weight:900; color:#00ea96; font-size: 13px;">TEAM B</span>
                        <span id="liveBadgeB" class="live-badge" style="display:none;">-</span>
                    </div>
                    <div id="liveListB"></div>
                </div>
            </div>
            <button class="main-btn pick-team-btn" onclick="generateTeams()">팀원 & 공/수 랜덤 추첨하기</button>
            <button class="main-btn summary-btn" onclick="openFinalSummary()">💥 최종 추첨 결과 한눈에 보기 (팝업)</button>
        </div>
    </div>

    <div class="sidebar">
        <div class="side-box">
            <h2>STEP 1. 뽑기 티어 & 선픽/후픽</h2>
            <button class="side-btn" onclick="drawTierAndOrder()">🎲 뽑기 티어 & 선픽/후픽 랜덤 추첨하기</button>
            <button class="side-btn" style="background:#ff4655; color:white; display:none;" id="rerollBtn" onclick="reRollOrder()">🔄 선픽/후픽 리롤하기</button>
            
            <div id="sideDrawResult" class="draw-box">추첨 대기 중...</div>
            <div id="rerollResultArea" class="draw-box reroll-box">
                <div class="reroll-label">RE-ROLL</div>
                <div id="rerollContent" style="color:#00ea96; font-weight:bold;"></div>
            </div>
        </div>

        <div class="side-box">
            <h2>STEP 2. 드래프트</h2>
            <div id="draftRecordArea">
                <script>
                    const labels = ["팀장", "팀원 2", "팀원 3", "팀원 4", "팀원 5"];
                    for(let i=1; i<=5; i++) {
                        document.write(`
                            <div class="draft-row">
                                <span class="draft-label">${labels[i-1]}</span>
                                <input type="text" id="rec_${i}_A" class="side-input" style="padding:10px; font-size:13px;" placeholder="팀 A">
                                <input type="text" id="rec_${i}_B" class="side-input" style="padding:10px; font-size:13px;" placeholder="팀 B">
                            </div>
                        `);
                    }
                </script>
            </div>
        </div>

        <div class="side-box">
            <h2>STEP 3. 공/수 추첨</h2>
            <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                <input type="text" id="leader1" class="side-input" placeholder="팀장 1" style="padding:12px;">
                <input type="text" id="leader2" class="side-input" placeholder="팀장 2" style="padding:12px;">
            </div>
            <button class="side-btn" style="background: #ff4655; color: white;" onclick="pickSideOnly()">🎲 공/수 추첨하기</button>
            <div id="sideOnlyResult" class="draw-box" style="display:none; font-size: 16px;"></div>

            <div style="margin-top:15px; padding-top:15px; border-top:1px solid #333;">
                <button class="side-btn" style="background: #ece8e1; color:#0f1923; margin-bottom:0;" onclick="manualSummary()">💥 최종 추첨 결과 한눈에 보기 (팝업)</button>
            </div>
        </div>
    </div>
</div>

<div id="finalModal" class="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="close-modal-btn" onclick="closeModal()">&times;</button>
        <div class="modal-header">MATCH</div>
        <div style="background:#0f1923; padding:20px; border-radius:12px; text-align:center; margin-bottom:25px; border: 1px solid #333;">
            <span style="font-size:14px; color:#888; display:block; margin-bottom:5px;">MAP</span>
            <span id="modalMap" style="font-size:24px; font-weight:bold; color:#ece8e1;">?</span>
            <div id="popupPosArea" class="modal-pos-container"></div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
            <div style="background:#16202a; padding:20px; border-radius:15px; border:1px solid #2a3a4a;">
                <div style="display:flex; flex-direction:column; align-items:center; gap:10px; margin-bottom:15px;">
                    <b id="modalTeamA" style="font-size:18px; color:#ff4655;">TEAM A</b>
                    <span id="modalBadgeA" class="modal-badge">-</span>
                </div>
                <ul id="modalListA" class="modal-player-list"></ul>
            </div>
            <div style="background:#16202a; padding:20px; border-radius:15px; border:1px solid #2a3a4a;">
                <div style="display:flex; flex-direction:column; align-items:center; gap:10px; margin-bottom:15px;">
                    <b id="modalTeamB" style="font-size:18px; color:#00ea96;">TEAM B</b>
                    <span id="modalBadgeB" class="modal-badge">-</span>
                </div>
                <ul id="modalListB" class="modal-player-list"></ul>
            </div>
        </div>
    </div>
</div>

<script>
    // --- 포지션 믹서 기능 로직 ---
    function togglePosMixer() {
        const panel = document.getElementById('posMixer');
        const btn = document.getElementById('posToggleBtn');
        panel.classList.toggle('active');
        if(panel.classList.contains('active')) {
            btn.classList.add('on');
        } else {
            btn.classList.remove('on');
        }
    }

    function mixPosition(tier) {
        const pool = document.getElementById(`pool_${tier}`);
        const actives = pool.querySelectorAll('.pos-btn.active');
        if(actives.length === 0) return alert("활성된 포지션이 없습니다.");
        const rand = Math.floor(Math.random() * actives.length);
        document.getElementById(`res_${tier}`).innerText = actives[rand].innerText;
        document.getElementById(`res_${tier}`).style.color = "#00ea96";
    }

    function updatePopupPositions() {
        const popupPosArea = document.getElementById('popupPosArea');
        const posPanel = document.getElementById('posMixer');
        if(!posPanel.classList.contains('active')) {
            popupPosArea.innerHTML = "";
            return;
        }
        let html = "";
        for(let i=1; i<=5; i++) {
            const resElement = document.getElementById(`res_${i}`);
            const currentRes = resElement.innerText;
            let displayValue = "";
            if(currentRes !== "대기 중") {
                displayValue = currentRes;
            } else {
                const pool = document.getElementById(`pool_${i}`);
                const actives = pool.querySelectorAll('.pos-btn.active');
                displayValue = actives.length > 0 ? Array.from(actives).map(btn => btn.innerText).join('/') : "없음";
            }
            html += `<div class="modal-pos-item"><span class="modal-pos-label">티어 ${i}</span><span class="modal-pos-value">${displayValue}</span></div>`;
        }
        popupPosArea.innerHTML = html;
    }

    const allMaps = ["어비스", "로터스", "바인드", "아이스박스", "선셋", "헤이븐", "어센트", "프랙처", "펄", "브리즈", "스플릿", "코로드"];
    let activeMaps = [...allMaps];
    let currentTierData = null;
    let lastGeneratedData = null;
    let sideDrawResult = null;

    function initMaps() {
        const sel = document.getElementById('mapSelector');
        sel.innerHTML = allMaps.map(m => `<div class="map-item active" onclick="toggleMap(this, '${m}')">${m}</div>`).join('');
    }
    function toggleMap(el, name) {
        el.classList.toggle('active');
        if(el.classList.contains('active')) activeMaps.push(name);
        else activeMaps = activeMaps.filter(m => m !== name);
    }
    function pickMap() {
        if(!activeMaps.length) return alert("맵을 선택해주세요.");
        const map = activeMaps[Math.floor(Math.random()*activeMaps.length)];
        document.getElementById('mapResultArea').style.display = "block";
        document.getElementById('selectedMap').innerText = map;
    }
    function applySideStyle(element, isAtk) {
        element.innerText = isAtk ? "공격" : "수비";
        element.style.background = isAtk ? "#ff4655" : "#00ea96";
        element.style.color = isAtk ? "white" : "#0f1923";
    }
    function generateTeams() {
        let a = []; let b = [];
        for(let i=1; i<=5; i++) {
            const p1 = document.getElementById(`p${i}_1`).value.trim();
            const p2 = document.getElementById(`p${i}_2`).value.trim();
            const lock = document.querySelector(`#row-${i} .lock-btn`).classList.contains('locked');
            if(!p1 || !p2) return alert(i+"티어 멤버를 입력하세요.");
            if(lock || Math.random() > 0.5) { a.push(p1); b.push(p2); }
            else { a.push(p2); b.push(p1); }
        }
        const isAAtk = Math.random() > 0.5;
        lastGeneratedData = { a, b, isAAtk };
        const bA = document.getElementById('liveBadgeA');
        const bB = document.getElementById('liveBadgeB');
        bA.style.display = "inline-block";
        bB.style.display = "inline-block";
        applySideStyle(bA, isAAtk);
        applySideStyle(bB, !isAAtk);
        document.getElementById('liveListA').innerHTML = a.map(n => `<div class="player-line">• ${n}</div>`).join('');
        document.getElementById('liveListB').innerHTML = b.map(n => `<div class="player-line">• ${n}</div>`).join('');
    }
    function openFinalSummary() {
        const map = document.getElementById('selectedMap').innerText;
        if(!lastGeneratedData || map === "-") return alert("팀원 추첨과 맵 추첨을 먼저 완료해주세요!");
        document.getElementById('modalMap').innerText = map;
        document.getElementById('modalTeamA').innerText = "TEAM A";
        document.getElementById('modalTeamB').innerText = "TEAM B";
        applySideStyle(document.getElementById('modalBadgeA'), lastGeneratedData.isAAtk);
        applySideStyle(document.getElementById('modalBadgeB'), !lastGeneratedData.isAAtk);
        document.getElementById('modalListA').innerHTML = lastGeneratedData.a.map(n => `<li>• ${n}</li>`).join('');
        document.getElementById('modalListB').innerHTML = lastGeneratedData.b.map(n => `<li>• ${n}</li>`).join('');
        updatePopupPositions(); 
        document.getElementById('finalModal').style.display = "flex";
    }
    function drawTierAndOrder() {
        const tiers = [];
        for(let i=1; i<=5; i++){
            const p1 = document.getElementById(`p${i}_1`).value;
            const p2 = document.getElementById(`p${i}_2`).value;
            if(p1 && p2) tiers.push({i, p1, p2});
        }
        if(!tiers.length) return alert("명단을 입력하세요.");
        currentTierData = tiers[Math.floor(Math.random()*tiers.length)];
        document.getElementById('rerollBtn').style.display = "block";
        document.getElementById('rerollResultArea').style.display = "none";
        const s = [currentTierData.p1, currentTierData.p2].sort(() => Math.random()-0.5);
        document.getElementById('sideDrawResult').innerHTML = `티어 ${currentTierData.i} 당첨!<br>선픽: <b>${s[0]}</b> / 후픽: <b>${s[1]}</b>`;
        document.getElementById('rec_1_A').value = s[0];
        document.getElementById('rec_1_B').value = s[1];
        document.getElementById('leader1').value = s[0];
        document.getElementById('leader2').value = s[1];
    }
    function reRollOrder() {
        if(!currentTierData) return;
        const s = [currentTierData.p1, currentTierData.p2].sort(() => Math.random()-0.5);
        const area = document.getElementById('rerollResultArea');
        area.style.display = "block";
        document.getElementById('rerollContent').innerHTML = `리롤 결과! <br>선픽: ${s[0]} / 후픽: ${s[1]}`;
    }
    function pickSideOnly() {
        const l1 = document.getElementById('leader1').value;
        const l2 = document.getElementById('leader2').value;
        if(!l1 || !l2) return alert("팀장 명단이 비어있습니다.");
        const isAtk = Math.random() > 0.5;
        sideDrawResult = isAtk;
        const resBox = document.getElementById('sideOnlyResult');
        resBox.style.display = "block";
        const text1 = isAtk ? `<span style="color:#ff4655; font-weight:900;">공격</span>` : `<span style="color:#00ea96; font-weight:900;">수비</span>`;
        const text2 = !isAtk ? `<span style="color:#ff4655; font-weight:900;">공격</span>` : `<span style="color:#00ea96; font-weight:900;">수비</span>`;
        resBox.innerHTML = `<b>${l1}</b>: ${text1} / <b>${l2}</b>: ${text2}`;
    }
    function manualSummary() {
        const l1 = document.getElementById('leader1').value;
        const l2 = document.getElementById('leader2').value;
        const map = document.getElementById('selectedMap').innerText;
        if(!l1 || !l2 || map === "-") return alert("팀장 이름과 맵을 확인해주세요.");
        if(sideDrawResult === null) return alert("공/수 랜덤 뽑기를 먼저 진행해주세요.");
        document.getElementById('modalMap').innerText = map;
        document.getElementById('modalTeamA').innerText = "TEAM " + l1;
        document.getElementById('modalTeamB').innerText = "TEAM " + l2;
        applySideStyle(document.getElementById('modalBadgeA'), sideDrawResult);
        applySideStyle(document.getElementById('modalBadgeB'), !sideDrawResult);
        let la = ""; let lb = "";
        for(let i=1; i<=5; i++) {
            la += `<li>• ${document.getElementById('rec_'+i+'_A').value || '?'}</li>`;
            lb += `<li>• ${document.getElementById('rec_'+i+'_B').value || '?'}</li>`;
        }
        document.getElementById('modalListA').innerHTML = la;
        document.getElementById('modalListB').innerHTML = lb;
        updatePopupPositions(); 
        document.getElementById('finalModal').style.display = "flex";
    }
    function closeModal() { document.getElementById('finalModal').style.display = "none"; }
    initMaps();
</script>
</body>
</html>
