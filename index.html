<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>트할의 발로란트</title>
    <style>
        body { background: #0f1923; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .main-layout { display: flex; gap: 25px; max-width: 1300px; width: 100%; }
        
        .container { flex: 1.5; background: #1f2933; padding: 30px; border-radius: 15px; border-top: 5px solid #ff4655; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .sidebar { flex: 1; display: flex; flex-direction: column; gap: 20px; min-width: 420px; }
        .side-box { background: #16202a; padding: 22px; border-radius: 15px; border: 1px solid #2a3a4a; }
        
        .copyright-notice { 
            background: #ff4655; color: white; padding: 12px; border-radius: 8px; 
            font-size: 11px; font-weight: bold; line-height: 1.5; text-align: center; 
            margin-bottom: 5px; border: 1px solid rgba(255,255,255,0.2); 
        }

        h1 { color: #ff4655; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 25px; font-size: 24px; text-align: center; }
        h2 { font-size: 14px; color: #ece8e1; margin-top: 0; text-align: left; border-left: 5px solid #ff4655; padding-left: 12px; margin-bottom: 15px; text-transform: uppercase; }

        .tier-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 8px; }
        .tier-label { width: 65px; font-weight: bold; color: #ff4655; font-size: 14px; }
        .tier-input, .side-input { flex: 1; padding: 12px; border: none; border-radius: 5px; background: #ece8e1; color: #0f1923; font-weight: bold; font-size: 14px; }
        .lock-btn { width: 55px; padding: 10px; border: 1px solid #444; border-radius: 5px; cursor: pointer; background: #2a3a4a; color: #888; font-size: 11px; }
        .lock-btn.locked { background: #ff4655; color: white; }

        .draw-box { padding: 15px; background: #0f1923; border-radius: 8px; border: 2px solid #333; text-align: center; margin-bottom: 10px; }
        .reroll-box { border-color: #00ea96; position: relative; } /* 재추첨 박스 강조 */
        .reroll-tag { position: absolute; top: -10px; right: 10px; background: #00ea96; color: #0f1923; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        
        .draw-tier-title { color: #ff4655; font-size: 18px; font-weight: 900; margin-bottom: 10px; }
        .pick-order-container { display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .pick-item { display: flex; align-items: center; gap: 10px; width: 100%; justify-content: center; }
        .pick-label { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 900; text-transform: uppercase; min-width: 40px; }
        .label-first { background: #00ea96; color: #0f1923; }
        .label-second { background: #555; color: #ccc; }
        .pick-name { font-size: 16px; font-weight: bold; color: white; }

        .record-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; width: 100%; }
        .record-step { font-size: 12px; color: #ff4655; width: 50px; font-weight: bold; flex-shrink: 0; }
        .record-input { flex: 1; padding: 8px 10px; border: none; border-radius: 4px; background: #ece8e1; color: #0f1923; font-weight: bold; font-size: 13px; text-align: center; }

        .side-btn { background: #00ea96; color: #0f1923; width: 100%; border: none; padding: 14px; font-weight: 900; border-radius: 6px; cursor: pointer; margin-bottom: 12px; font-size: 15px; text-transform: uppercase; transition: 0.2s; }
        .side-btn:hover { opacity: 0.8; }
        .reroll-btn { background: #ff4655; color: white; margin-top: 10px; display: none; }

        .manual-side-result { margin-top: 15px; padding: 15px; border-radius: 8px; font-weight: 900; text-align: center; font-size: 17px; display: none; }
        .atk-win { background: #ff4655; color: #ffffff !important; }
        .def-win { background: #00ea96; color: #0f1923 !important; }

        .map-selector { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        .map-item { padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; background: #2a3a4a; color: #7e8c9a; }
        .map-item.active { background: #ece8e1; color: #0f1923; }
        .main-btn { border: none; padding: 15px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 5px; width: 100%; margin-top: 10px; }
        .pick-team-btn { background: #ff4655; color: white; }
        .pick-map-btn { background: #ece8e1; color: #0f1923; }

        .result-wrapper { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 25px; }
        .map-result-box { width: 100%; background: linear-gradient(45deg, #ff4655, #ff7e87); color: white; padding: 20px; border-radius: 8px; font-size: 22px; font-weight: 900; display: none; text-align: center; }
        .teams-container { display: flex; gap: 20px; justify-content: center; width: 100%; }
        .result-card { background: #16202a; border: 2px solid #333; padding: 30px 20px 20px 20px; width: 45%; border-radius: 10px; position: relative; }
        .side-badge { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); padding: 5px 25px; border-radius: 20px; font-weight: 900; font-size: 14px; }
        .side-atk { background: #ff4655; color: white; }
        .side-def { background: #00ea96; color: #0f1923; }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="container">
        <h1>트할의 발로란트</h1>
        <div class="section">
            <h2>1. 플레이어 명단 (잠금/해제 클릭 시 묶밸)</h2>
            <div id="tierInputs">
                <script>
                    for(let i=1; i<=5; i++) {
                        document.write(`
                            <div class="tier-row" id="row-${i}">
                                <span class="tier-label">티어 ${i}</span>
                                <input type="text" class="tier-input" id="p${i}_1" placeholder="팀원 1">
                                <input type="text" class="tier-input" id="p${i}_2" placeholder="팀원 2">
                                <button class="lock-btn" onclick="this.classList.toggle('locked'); this.innerText = this.classList.contains('locked') ? '잠금' : '해제';">해제</button>
                            </div>
                        `);
                    }
                </script>
            </div>
        </div>
        <div class="section">
            <h2>2. 맵 풀 설정 (맵 클릭 시 추첨 제외)</h2>
            <div id="mapSelector" class="map-selector"></div>
        </div>
        <div class="action-btns">
            <button class="main-btn pick-team-btn" onclick="generateTeams()">팀원 및 공/수 랜덤 추첨</button>
            <button class="main-btn pick-map-btn" onclick="pickMap()">맵 추첨</button>
        </div>
        <div class="result-wrapper">
            <div id="mapResultArea" class="map-result-box">🗺️ 선택된 맵: <span id="selectedMap">-</span></div>
            <div class="teams-container" id="teamsResultContainer"></div>
        </div>
    </div>

    <div class="sidebar">
        <div class="copyright-notice">
            본 사이트의 저작권은 트할에게 있으며 트할의 허락시 자유롭게 사용 가능하며 무단 수정/배포 금지합니다
        </div>

        <div class="side-box">
            <h2>STEP 1. 뽑기 티어 & 선픽/후픽 추첨</h2>
            <button class="side-btn" id="mainDrawBtn" onclick="drawTierAndOrder()">🎲 랜덤 티어 / 선픽&후픽 뽑기</button>
            <button class="side-btn reroll-btn" id="rerollBtn" onclick="reRollOnlyOrder()">🔄 선픽/후픽 다시 뽑기</button>
            
            <div id="sideDrawResult" class="draw-box">추첨 대기 중...</div>
            <div id="reRollResultArea" class="draw-box reroll-box" style="display:none;"></div>
        </div>

        <div class="side-box">
            <h2>STEP 2. 드래프트</h2>
            <div id="draftRecordArea">
                <script>
                    for(let i=1; i<=5; i++) {
                        document.write(`
                            <div class="record-row">
                                <span class="record-step">팀원${i}</span>
                                <input type="text" id="record_T${i}_A" class="record-input" placeholder="${i===1?'팀장1':'팀원'}">
                                <input type="text" id="record_T${i}_B" class="record-input" placeholder="${i===1?'팀장2':'팀원'}">
                            </div>
                        `);
                    }
                </script>
            </div>
        </div>

        <div class="side-box">
            <h2>STEP 3. 공/수 추첨</h2>
            <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                <input type="text" id="manualP1" class="side-input" placeholder="팀장 1">
                <input type="text" id="manualP2" class="side-input" placeholder="팀장 2">
            </div>
            <button class="side-btn" style="background: #ece8e1;" onclick="pickSideManual()">💥 공/수 뽑기</button>
            <div id="manualSideResult" class="manual-side-result"></div>
        </div>
    </div>
</div>

<script>
    const allMaps = ["어비스", "로터스", "바인드", "아이스박스", "선셋", "헤이븐", "어센트", "프랙처", "펄", "브리즈", "스플릿", "코로드"];
    let activeMaps = [...allMaps];
    let currentSelectedTierData = null;

    function initMapSelector() {
        const selector = document.getElementById('mapSelector');
        selector.innerHTML = allMaps.map(map => `<div class="map-item active" onclick="toggleMap(this, '${map}')">${map}</div>`).join('');
    }

    function toggleMap(element, mapName) {
        element.classList.toggle('active');
        if (element.classList.contains('active')) activeMaps.push(mapName);
        else activeMaps = activeMaps.filter(m => m !== mapName);
    }

    function drawTierAndOrder() {
        const tiers = [];
        for (let i = 1; i <= 5; i++) {
            const p1 = document.getElementById(`p${i}_1`).value.trim();
            const p2 = document.getElementById(`p${i}_2`).value.trim();
            if (p1 && p2) tiers.push({ index: i, p1, p2 });
        }
        if (tiers.length === 0) return alert("왼쪽 명단에 이름을 입력해주세요!");
        
        currentSelectedTierData = tiers[Math.floor(Math.random() * tiers.length)];
        
        // 메인 결과창 초기화 및 재추첨창 숨기기
        document.getElementById('reRollResultArea').style.display = 'none';
        
        const sel = currentSelectedTierData;
        const shuffle = [sel.p1, sel.p2].sort(() => Math.random() - 0.5);
        
        const resultDiv = document.getElementById('sideDrawResult');
        resultDiv.innerHTML = `
            <div class="draw-tier-title">티어 ${sel.index} 당첨!</div>
            <div class="pick-order-container">
                <div class="pick-item"><span class="pick-label label-first">선픽</span><span class="pick-name">${shuffle[0]}</span></div>
                <div class="pick-item"><span class="pick-label label-second">후픽</span><span class="pick-name">${shuffle[1]}</span></div>
            </div>
        `;

        updateDraftInputs(shuffle[0], shuffle[1]);
        document.getElementById('rerollBtn').style.display = 'block';
    }

    function reRollOnlyOrder() {
        if (!currentSelectedTierData) return;
        
        const sel = currentSelectedTierData;
        const shuffle = [sel.p1, sel.p2].sort(() => Math.random() - 0.5);
        
        const rerollDiv = document.getElementById('reRollResultArea');
        rerollDiv.style.display = 'block';
        rerollDiv.innerHTML = `
            <div class="reroll-tag">RE-ROLL</div>
            <div class="draw-tier-title" style="color:#00ea96;">최종 재추첨 결과</div>
            <div class="pick-order-container">
                <div class="pick-item"><span class="pick-label label-first">선픽</span><span class="pick-name">${shuffle[0]}</span></div>
                <div class="pick-item"><span class="pick-label label-second">후픽</span><span class="pick-name">${shuffle[1]}</span></div>
            </div>
        `;

        updateDraftInputs(shuffle[0], shuffle[1]);
    }

    // 입력창 자동 업데이트 공통 함수
    function updateDraftInputs(p1, p2) {
        document.getElementById('record_T1_A').value = p1;
        document.getElementById('record_T1_B').value = p2;
        document.getElementById('manualP1').value = p1;
        document.getElementById('manualP2').value = p2;
    }

    function pickSideManual() {
        const p1 = document.getElementById('manualP1').value.trim();
        const p2 = document.getElementById('manualP2').value.trim();
        if (!p1 || !p2) return alert("이름을 입력해주세요!");
        const resDiv = document.getElementById('manualSideResult');
        const isP1Atk = Math.random() > 0.5;
        resDiv.style.display = "block";
        resDiv.className = "manual-side-result " + (isP1Atk ? "atk-win" : "def-win");
        resDiv.innerHTML = isP1Atk ? `${p1}: 공격 / ${p2}: 수비` : `${p1}: 수비 / ${p2}: 공격`;
    }

    function generateTeams() {
        let teamA = []; let teamB = [];
        for (let i = 1; i <= 5; i++) {
            const p1 = document.getElementById(`p${i}_1`).value.trim();
            const p2 = document.getElementById(`p${i}_2`).value.trim();
            const lock = document.querySelector(`#row-${i} .lock-btn`).classList.contains('locked');
            if (!p1 || !p2) return alert(`티어 ${i}를 입력해주세요!`);
            if (lock || Math.random() > 0.5) { teamA.push({name:p1, tier:i}); teamB.push({name:p2, tier:i}); }
            else { teamA.push({name:p2, tier:i}); teamB.push({name:p1, tier:i}); }
        }
        const isAAtk = Math.random() > 0.5;
        const render = (p) => `<div style="padding:10px 0; border-bottom:1px solid #2a3a4a; font-size:15px; display:flex; justify-content:space-between;"><span>${p.name}</span><span style="font-size:11px;color:#666;">T${p.tier}</span></div>`;
        document.getElementById('teamsResultContainer').innerHTML = `
            <div class="result-card"><div class="side-badge ${isAAtk?'side-atk':'side-def'}">${isAAtk?'공 격':'수 비'}</div><h3>TEAM A</h3>${teamA.map(render).join('')}</div>
            <div class="result-card"><div class="side-badge ${isAAtk?'side-def':'side-atk'}">${isAAtk?'수 비':'공 격'}</div><h3>TEAM B</h3>${teamB.map(render).join('')}</div>
        `;
    }

    function pickMap() {
        if (activeMaps.length === 0) return alert("맵을 선택해주세요!");
        document.getElementById('mapResultArea').style.display = "block";
        document.getElementById('selectedMap').innerText = activeMaps[Math.floor(Math.random() * activeMaps.length)];
    }
    initMapSelector();
</script>
</body>
</html>
